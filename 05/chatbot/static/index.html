<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniGPT 한국어 챗봇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 MiniGPT 한국어 챗봇</h1>

        <!-- 채팅 화면 -->
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                안녕하세요! 문장을 입력하면 이어서 써드릴게요 😊
            </div>
        </div>

        <!-- 입력창 -->
        <div class="input-area">
            <input
                type="text"
                id="userInput"
                placeholder="문장을 입력하세요..."
            />
            <button id="nextWordBtn">다음 단어</button>
            <button id="sendBtn">문장 완성</button>
        </div>

        <!-- 설정 -->
        <div class="settings">
            <label>
                창의성 (temperature):
                <input type="range" id="temperature" min="0.1" max="1.5" step="0.1" value="0.8">
                <span id="tempValue">0.8</span>
            </label>
            <label>
                최대 길이:
                <input type="range" id="maxTokens" min="20" max="200" step="10" value="100">
                <span id="maxValue">100</span>
            </label>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
